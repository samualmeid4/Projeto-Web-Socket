<html>
    <head>
        <title>Painel WebSocket - Pedidos em tempo real</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            :root {
                color-scheme: light;
                font-family: Arial, Helvetica, sans-serif;
                --bg: #f4f7fb;
                --panel: #ffffff;
                --text: #172033;
                --muted: #65738a;
                --line: #d9e2ef;
                --accent: #0f8b8d;
                --accent-dark: #0a6f72;
                --warn: #f6b73c;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: var(--bg);
                color: var(--text);
            }

            main {
                width: min(1040px, calc(100% - 32px));
                margin: 0 auto;
                padding: 32px 0;
            }

            header {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 24px;
            }

            h1 {
                margin: 0 0 6px;
                font-size: clamp(1.75rem, 3vw, 2.6rem);
                letter-spacing: 0;
            }

            p {
                margin: 0;
                color: var(--muted);
            }

            .status {
                min-width: 160px;
                padding: 10px 12px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
                font-weight: 700;
                text-align: center;
            }

            .status.conectado {
                color: #116b38;
            }

            .status.desconectado {
                color: #9a3412;
            }

            .layout {
                display: grid;
                grid-template-columns: 320px 1fr;
                gap: 18px;
                align-items: start;
            }

            section {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 18px;
            }

            h2 {
                margin: 0 0 14px;
                font-size: 1rem;
                letter-spacing: 0;
            }

            label {
                display: block;
                margin-bottom: 8px;
                color: var(--muted);
                font-size: 0.92rem;
                font-weight: 700;
            }

            input {
                width: 100%;
                min-height: 42px;
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 10px 12px;
                font: inherit;
                color: var(--text);
                background: #fff;
            }

            input:focus {
                outline: 3px solid rgba(15, 139, 141, 0.18);
                border-color: var(--accent);
            }

            button {
                width: 100%;
                min-height: 42px;
                margin-top: 12px;
                border: 0;
                border-radius: 8px;
                background: var(--accent);
                color: #fff;
                font: inherit;
                font-weight: 700;
                cursor: pointer;
            }

            button:hover {
                background: var(--accent-dark);
            }

            button:disabled {
                cursor: not-allowed;
                background: #9aa7b8;
            }

            .dados {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-bottom: 16px;
            }

            .metric {
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 12px;
                background: #fbfdff;
            }

            .metric strong {
                display: block;
                font-size: 1.35rem;
            }

            .metric span {
                display: block;
                margin-top: 4px;
                color: var(--muted);
                font-size: 0.82rem;
            }

            #retorno {
                display: flex;
                flex-direction: column;
                gap: 10px;
                min-height: 340px;
                max-height: 460px;
                overflow-y: auto;
                padding-right: 4px;
            }

            .mensagem {
                border-left: 4px solid var(--accent);
                border-radius: 8px;
                padding: 12px;
                background: #f8fbfc;
                overflow-wrap: anywhere;
            }

            .mensagem.sistema {
                border-left-color: var(--warn);
            }

            .mensagem strong {
                display: block;
                margin-bottom: 4px;
            }

            .mensagem small {
                display: block;
                margin-top: 6px;
                color: var(--muted);
            }

            @media (max-width: 760px) {
                header,
                .layout {
                    display: block;
                }

                .status,
                section {
                    margin-top: 16px;
                }

                .dados {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <header>
                <div>
                    <h1>Pedidos em tempo real</h1>
                    <p>Demonstração WebSocket com envio do cliente e broadcast do servidor.</p>
                </div>
                <div id="status" class="status desconectado">Conectando...</div>
            </header>

            <div class="layout">
                <section>
                    <h2>Enviar atualização</h2>
                    <form id="formularioComentario">
                        <label for="nome">Cliente</label>
                        <input id="nome" type="text" name="nome" maxlength="30" placeholder="Ex.: Caixa 1">

                        <label for="descricao" style="margin-top: 14px;">Mensagem</label>
                        <input id="descricao" type="text" name="descricao" maxlength="120" placeholder="Ex.: Novo pedido #104 recebido">

                        <button id="botaoEnviar" type="submit" disabled>Enviar para todos</button>
                    </form>
                </section>

                <section>
                    <div class="dados">
                        <div class="metric">
                            <strong id="totalClientes">0</strong>
                            <span>clientes online</span>
                        </div>
                        <div class="metric">
                            <strong id="totalMensagens">0</strong>
                            <span>mensagens recebidas</span>
                        </div>
                        <div class="metric">
                            <strong>ws://</strong>
                            <span>protocolo utilizado</span>
                        </div>
                    </div>
                    <div id="retorno"></div>
                </section>
            </div>
        </main>

        <script type="text/javascript">
            var socket = new WebSocket("ws://" + window.location.host + "/WS2/acoes");
            var formulario = document.getElementById("formularioComentario");
            var campoNome = document.getElementById("nome");
            var campoDescricao = document.getElementById("descricao");
            var botaoEnviar = document.getElementById("botaoEnviar");
            var statusConexao = document.getElementById("status");
            var totalClientes = document.getElementById("totalClientes");
            var totalMensagens = document.getElementById("totalMensagens");
            var mensagensRecebidas = 0;

            campoNome.value = localStorage.getItem("nomeClienteWs") || ("Cliente " + Math.floor(Math.random() * 1000));

            socket.onopen = function(){
                statusConexao.textContent = "Conectado";
                statusConexao.className = "status conectado";
                botaoEnviar.disabled = false;
                identificarCliente();
            };

            socket.onmessage = mensagemConfirmacao;

            socket.onclose = function(){
                statusConexao.textContent = "Desconectado";
                statusConexao.className = "status desconectado";
                botaoEnviar.disabled = true;
            };

            socket.onerror = function(){
                statusConexao.textContent = "Erro na conexao";
                statusConexao.className = "status desconectado";
            };

            campoNome.addEventListener("change", identificarCliente);
            formulario.addEventListener("submit", submeter);

            function identificarCliente(){
                var nome = campoNome.value.trim();
                if(socket.readyState !== WebSocket.OPEN || nome.length === 0){
                    return;
                }
                localStorage.setItem("nomeClienteWs", nome);
                socket.send(JSON.stringify({acao: "entrar", nome: nome}));
            }

            function submeter(evento){
                evento.preventDefault();
                var descricao = campoDescricao.value.trim();
                if(socket.readyState !== WebSocket.OPEN || descricao.length === 0){
                    return;
                }

                var acaoUsuario = {acao: "adicionar", descricao: descricao};
                socket.send(JSON.stringify(acaoUsuario));
                campoDescricao.value = "";
                campoDescricao.focus();
            }

            function mensagemConfirmacao(e){
                var comentario = JSON.parse(e.data);

                if(comentario.acao === "comentarioAdicionado"){
                    mensagensRecebidas++;
                    totalMensagens.textContent = mensagensRecebidas;
                    adicionarLinha(comentario.nome, comentario.descricao, false);
                }

                if(comentario.acao === "clienteEntrou"){
                    adicionarLinha("Sistema", comentario.nome + " entrou no painel.", true);
                }

                if(comentario.acao === "clienteSaiu"){
                    adicionarLinha("Sistema", comentario.nome + " saiu do painel.", true);
                }

                if(comentario.totalClientes !== undefined){
                    totalClientes.textContent = comentario.totalClientes;
                }
            }

            function adicionarLinha(autor, texto, sistema){
                var retorno = document.getElementById("retorno");
                var novoComentario = document.createElement("div");
                novoComentario.className = sistema ? "mensagem sistema" : "mensagem";
                novoComentario.innerHTML = "<strong></strong><span></span><small></small>";
                novoComentario.querySelector("strong").textContent = autor;
                novoComentario.querySelector("span").textContent = texto;
                novoComentario.querySelector("small").textContent = new Date().toLocaleTimeString();
                retorno.appendChild(novoComentario);
                retorno.scrollTop = retorno.scrollHeight;
            }
        </script>
    </body>
</html>
